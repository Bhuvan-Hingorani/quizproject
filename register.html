<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Python Quiz</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="navbar-logo">
    <div class="logo-icon">🧠</div>
    codex_bhuvi_
  </a>
  <div class="navbar-actions">
    <span>Already have an account?</span>
    <a href="/" class="btn-nav">Login</a>
  </div>
</nav>

<!-- Page -->
<div class="page-wrapper">
  <div class="auth-card">

    <!-- Left illustration -->
    <div class="auth-left">
      <div class="auth-illustration">❓</div>
      <div class="auth-left-caption">
        <h3>Take a Quiz be more creative<br>in your work</h3>
      </div>
      <div class="slide-dots">
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Right form -->
    <div class="auth-right">
      <h2>Welcome to Quizkarooo</h2>
      <p class="subtitle">Register your account</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register">
        <div class="input-group">
          <label>Enter Name</label>
          <input type="text" name="username" placeholder="Pranav Kulkarni" required autocomplete="username">
        </div>
        <div class="input-group">
          <label>Enter Email</label>
          <input type="email" name="email" placeholder="Pranav@gmail.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label>Enter Password</label>
          <div class="password-wrap">
            <input type="password" id="regPw" name="password" placeholder="••••••••••" required autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('regPw', this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <div class="social-row">
        <span>Create account with</span>
        <a href="#" class="social-icon">𝐟</a>
        <a href="#" class="social-icon">in</a>
        <a href="#" class="social-icon">G</a>
      </div>

    </div>
  </div>
</div>

<!-- Footer -->
<footer class="site-footer">
  <p class="footer-names">Made by <strong>Sakshi Upadhye</strong> &amp; <strong>Pranali Raut</strong></p>
  <p class="footer-copy">&copy; 2025 codex_bhuvi_. All rights reserved.</p>
</footer>

<script>
  function togglePw(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  }
</script>
</body>
</html>
